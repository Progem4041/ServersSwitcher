/**
 * Три JAR (1.20.x, 1.21.4–1.21.7, 1.21.8+): разный API / зависимости.
 * Сборка — изолированные GradleBuild (два разных Loom в одном дереве ломают remapJar).
 *
 * ./gradlew buildAll
 */
defaultTasks("buildAll")

tasks.register("build120", GradleBuild) {
    group = "build"
    description = "Сборка serverswitcher-1.20.1 (MC 1.20.x)"
    dir = file("serverswitcher-1.20.1")
    tasks = ["build"]
}

tasks.register("build1214", GradleBuild) {
    group = "build"
    description = "Сборка serverswitcher-1.21.4 (MC 1.21.4–1.21.7)"
    dir = file("serverswitcher-1.21.4")
    tasks = ["build"]
}

tasks.register("build1218", GradleBuild) {
    group = "build"
    description = "Сборка serverswitcher-1.21.8 (MC 1.21.8+)"
    dir = file("serverswitcher-1.21.8")
    tasks = ["build"]
}

tasks.register("buildAll") {
    group = "build"
    description = "Собирает все три варианта (изолированные процессы Gradle)"
    dependsOn("build120", "build1214", "build1218")
}
